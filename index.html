<!DOCTYPE html>
<html>
<head>
<title>Teacher Evaluation</title>

<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
button{
background-color: red;
color: white;
padding: 10px 20px;
border: none;
border-radius: 5px;
font-size: 16px;
cursor: pointer;
}

button:hover{
background-color: red;
}

body{
font-family: Arial, sans-serif;
padding: 15px;
max-width: 500px;
margin: auto;
}

input{
width: 100%;
padding: 10px;
font-size: 16px;
box-sizing: border-box;
}

button{
width: 100%;
margin-top: 10px;
}

h3{
text-align: center;
}
</style>

</head>
<body>

<h3>Teacher Evaluation</h3>

Teacher Name: <input type="text" id="teacher" placeholder="Enter Teacher's name"><br><br>
Student name: <input type="text" id="student" placeholder="Enter Student's name"><br><br>
Grade: <input type="number" id="grade" placeholder="Enter grade"><br><br>

<button onclick="check()">Check</button>

<p id="result"></p>

<script>
function check(){
let grade = document.getElementById("grade").value;
let result = (grade >= 80) ? "Passed!" : "Lawlaw";
document.getElementById("result").innerHTML = result;
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js')
.then(function() {
console.log("Service Worker Registered");
});
}
</script>

</body>
</html>
